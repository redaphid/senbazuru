name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: bash build.sh

      - name: Verify bundle
        run: |
          test -d "build/Senbazuru.app"
          codesign --verify --strict --verbose=2 "build/Senbazuru.app"

      - name: Zip app
        run: ditto -c -k --sequesterRsrc --keepParent "build/Senbazuru.app" "Senbazuru.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Senbazuru-app
          path: Senbazuru.zip
